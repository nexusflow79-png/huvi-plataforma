<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — HUVI</title>
  <meta name="robots" content="noindex, follow">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0f1e;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .container { text-align: center; max-width: 480px; }
    .status { font-size: 6rem; font-weight: 800; color: #3b82f6; line-height: 1; margin-bottom: 0.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; color: #f0f0f0; }
    p { color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">404</div>
    <h1>Página não encontrada</h1>
    <p>O conteúdo que você procura não está mais aqui ou o endereço está incorreto.</p>
    <a href="/" class="btn">Voltar ao início</a>
  </div>
</body>
</html>
